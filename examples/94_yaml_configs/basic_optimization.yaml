# Basic optimization config — minimal setup for a single API endpoint.
# Run: armature optimize basic_optimization.yaml

api:
  name: "my_api"
  endpoint: "https://api.example.com/v1/chat"
  auth:
    type: "api_key"
    token_env: "MY_API_KEY"  # reads from environment variable

search_space:
  parameters:
    temperature:
      type: "continuous"
      min: 0.0
      max: 1.0
    max_tokens:
      type: "continuous"
      min: 50
      max: 500

evaluation:
  test_cases:
    inline:
      - input: { prompt: "Summarize this article" }
        expected: { contains: "summary" }
  metrics:
    quality:
      weight: 1.0
      type: "higher_is_better"

optimization:
  algorithm: "mab_evolution"
  evolution:
    population_size: 10  # small for demo
    generations: 5
