name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check convergence/

      - name: Run mypy
        run: mypy convergence/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: [quality]
    environment:
      name: pypi
      url: https://pypi.org/p/the-convergence

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true